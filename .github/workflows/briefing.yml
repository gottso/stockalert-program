name: sector-briefing

on:
  schedule:
    - cron: '10 7 * * 1-5'    # 16:10 KST (GitHub 스케줄 - 백업용)
    - cron: '40 21 * * 1-5'   # 06:40 KST (GitHub 스케줄 - 백업용)
  workflow_dispatch:           # 수동 실행 버튼
  repository_dispatch:         # 외부(cron-job.org)에서 API로 실행
    types: [run-briefing]

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Korean font (나눔고딕)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum
          sudo fc-cache -f

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run briefing
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python collect_and_brief.py
